name: Release Desktop Installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (example: v0.3.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x64
            os: windows-latest
            dist_command: npm run desktop:dist:win -- --publish never
          - label: macos-x64
            os: macos-13
            dist_command: npm run desktop:dist:mac:x64 -- --publish never
          - label: macos-arm64
            os: macos-14
            dist_command: npm run desktop:dist:mac:arm64 -- --publish never
          - label: linux-x64
            os: ubuntu-latest
            dist_command: npm run desktop:dist:linux -- --publish never

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux system deps (manim/manimpango/sox)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libcairo2-dev \
            libpango1.0-dev \
            ffmpeg \
            sox \
            libsox-fmt-all

      - name: Install macOS system deps (sox)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install sox || true

      - name: Install root deps
        run: npm install

      - name: Install frontend deps
        run: npm --prefix frontend ci

      - name: Build installer
        run: ${{ matrix.dist_command }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.label }}
          path: |
            release/**/*.exe
            release/**/*.dmg
            release/**/*.AppImage
            release/**/*.zip
            release/**/*.yml
            release/**/*.yaml
            release/**/*.blockmap
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Resolve tag
        id: meta
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: UpcurvEd ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          target_commitish: ${{ github.sha }}
          files: |
            release-assets/**
          fail_on_unmatched_files: true
