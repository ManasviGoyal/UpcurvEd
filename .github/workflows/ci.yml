name: CI Pipeline

on:
  push:
    branches: [ main, milestone5 ]
  pull_request:
    branches: [ main, milestone5 ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Temporary release unblock switch.
  # Set to 'true' to re-enable CI jobs.
  # While false, this workflow is effectively disabled.
  # This keeps release-desktop workflow usable for installer publishing.
  #
  # Revert by changing each job `if` to `${{ true }}` or removing the `if` lines.

  # Job 1: linter and formatter checks
  lint-and-format:
    if: ${{ false }}
    name: Lint and Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image for testing
        run: |
          # Build the dev image with layer caching
          docker build -t math-animator-backend-base:${{ github.sha }} -f backend/Dockerfile.dev .

          # Create a test image with code copied in
          cat > Dockerfile.test <<EOF
          FROM math-animator-backend-base:${{ github.sha }}
          USER app
          WORKDIR /app
          COPY --chown=app:app backend/ /app/backend/
          COPY --chown=app:app tests/ /app/tests/
          COPY --chown=app:app pytest.ini /app/pytest.ini
          ENV PYTHONPATH=/app
          EOF

          docker build -t math-animator-backend:${{ github.sha }} -f Dockerfile.test .

      - name: Run Ruff linter
        run: |
          docker run --rm math-animator-backend:${{ github.sha }} ruff check /app/backend/ /app/tests/
        continue-on-error: true

      - name: Run Ruff formatter check
        run: |
          docker run --rm math-animator-backend:${{ github.sha }} ruff format --check /app/backend/ /app/tests/

  # Job 2: unit tests
  unit-tests:
    if: ${{ false }}
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image for testing
        run: |
          docker build -t math-animator-backend-base:${{ github.sha }} -f backend/Dockerfile.dev .

          cat > Dockerfile.test <<EOF
          FROM math-animator-backend-base:${{ github.sha }}
          USER app
          WORKDIR /app
          COPY --chown=app:app backend/ /app/backend/
          COPY --chown=app:app tests/ /app/tests/
          COPY --chown=app:app pytest.ini /app/pytest.ini
          ENV PYTHONPATH=/app
          EOF

          docker build -t math-animator-backend:${{ github.sha }} -f Dockerfile.test .

      - name: Run unit tests with coverage
        run: |
          docker run --name unit-test-container \
            math-animator-backend:${{ github.sha }} \
            bash -c "mkdir -p /tmp/coverage && pytest /app/tests/unit/ -v \
            --cov=/app/backend \
            --cov-report=term \
            --cov-report=html:/tmp/coverage/htmlcov \
            --cov-report=xml:/tmp/coverage/coverage.xml"

          docker cp unit-test-container:/tmp/coverage ${{ github.workspace }}/coverage-reports || true
          docker rm unit-test-container || true

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage-reports/coverage.xml
          retention-days: 7
          overwrite: true
        if: always()
        continue-on-error: true

  # Job 4: integration tests
  # Job 3: integration tests
  integration-tests:
    if: ${{ false }}
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image for testing
        run: |
          docker build -t math-animator-backend-base:${{ github.sha }} -f backend/Dockerfile.dev .

          cat > Dockerfile.test <<EOF
          FROM math-animator-backend-base:${{ github.sha }}
          USER app
          WORKDIR /app
          COPY --chown=app:app backend/ /app/backend/
          COPY --chown=app:app tests/ /app/tests/
          COPY --chown=app:app pytest.ini /app/pytest.ini
          ENV PYTHONPATH=/app
          EOF

          docker build -t math-animator-backend:${{ github.sha }} -f Dockerfile.test .

      - name: Run integration tests
        run: |
          docker run --rm \
            math-animator-backend:${{ github.sha }} \
            pytest /app/tests/integration/ -v --tb=short

  # Job 4: end-to-end tests
  system-tests:
    if: ${{ false }}
    name: System/E2E Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image for testing
        run: |
          docker build -t math-animator-backend-base:${{ github.sha }} -f backend/Dockerfile.dev .

          cat > Dockerfile.test <<EOF
          FROM math-animator-backend-base:${{ github.sha }}
          USER app
          WORKDIR /app
          COPY --chown=app:app backend/ /app/backend/
          COPY --chown=app:app tests/ /app/tests/
          COPY --chown=app:app pytest.ini /app/pytest.ini
          ENV PYTHONPATH=/app
          EOF

          docker build -t math-animator-backend:${{ github.sha }} -f Dockerfile.test .

      - name: Run system tests
        run: |
          docker run --rm \
            math-animator-backend:${{ github.sha }} \
            pytest /app/tests/system/ -v --tb=short

      - name: Run original pipeline test
        run: |
          docker run --rm \
            math-animator-backend:${{ github.sha }} \
            pytest /app/tests/test_generate_pipeline.py -v --tb=short

  # Job 5: test summary and coverage reporting
  test-summary:
    if: ${{ false }}
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [lint-and-format, unit-tests, integration-tests, system-tests]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download coverage reports
        uses: actions/download-artifact@v4
        with:
          name: coverage-unit
          path: coverage-reports/
        continue-on-error: true

      - name: Check job results
        run: |
          echo "Lint and Format: ${{ needs.lint-and-format.result }}"
          echo "Unit Tests: ${{ needs.unit-tests.result }}"
          echo "Integration Tests: ${{ needs.integration-tests.result }}"
          echo "System Tests: ${{ needs.system-tests.result }}"

          if [ "${{ needs.lint-and-format.result }}" != "success" ]; then
            echo "[FAILURE] Lint and format checks failed"
          fi
          if [ "${{ needs.unit-tests.result }}" != "success" ]; then
            echo "[FAILURE] Unit tests failed"
            exit 1
          fi
          if [ "${{ needs.integration-tests.result }}" != "success" ]; then
            echo "[FAILURE] Integration tests failed"
            exit 1
          fi
          if [ "${{ needs.system-tests.result }}" != "success" ]; then
            echo "[FAILURE] System tests failed"
            exit 1
          fi

          echo "[SUCCESS] All tests passed!"

      - name: Comment coverage on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            let coverage = 'Unit test coverage report not available';
            try {
              const coveragePath = path.join(process.cwd(), 'coverage-reports', 'coverage.xml');
              if (fs.existsSync(coveragePath)) {
                const xml = fs.readFileSync(coveragePath, 'utf8');
                const match = xml.match(/line-rate="([\d.]+)"/);
                if (match) {
                  const percent = (parseFloat(match[1]) * 100).toFixed(1);
                  const status = parseFloat(match[1]) >= 0.5 ? '✅' : '❌';
                  coverage = `${status} Unit test coverage: ${percent}% (required: ≥50%)`;
                }
              }
            } catch (e) {
              coverage = 'Could not read unit test coverage report';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## CI Pipeline Results\n\n${coverage}\n\n*Note: 50% coverage requirement applies only to unit tests.*\n\n[View detailed coverage report in artifacts]`
            });
        continue-on-error: true
