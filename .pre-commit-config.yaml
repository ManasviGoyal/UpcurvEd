repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      # Run the linter with auto-fix (fixes errors before commit)
      - id: ruff
        args: [--fix, --unsafe-fixes]  # Auto-fix including unsafe fixes (like B904)
        types_or: [python, pyi]
        files: ^(backend|tests)/
      # Run the formatter
      - id: ruff-format
        types_or: [python, pyi]
        files: ^(backend|tests)/

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-json
      - id: check-merge-conflict
      - id: detect-private-key
