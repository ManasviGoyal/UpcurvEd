<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Circle: mint → teal (cool, fresh) -->
    <linearGradient id="g1" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#3EE1C6"></stop>
      <stop offset="100%" stop-color="#0FA3B1"></stop>
    </linearGradient>

    <!-- Square: indigo → violet (deep, distinctive) -->
    <linearGradient id="g2" x1="0" x2="1" y1="1" y2="0">
      <stop offset="0%" stop-color="#6F6BF2"></stop>
      <stop offset="100%" stop-color="#B377F2"></stop>
    </linearGradient>
  </defs>

  <!-- Circle -->
  <circle cx="22" cy="22" r="14" fill="url(#g1)"></circle>

  <!-- Square -->
  <rect x="28" y="28" width="24" height="24" rx="4" fill="url(#g2)"></rect>

  <!-- Triangle (outline) -->
  <path d="M18 46 L32 16 L46 46 Z" fill="none" stroke="#0B1020" stroke-opacity="0.9" stroke-width="3" stroke-linejoin="round"></path>
</svg>
