[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -ra
    -v
    --strict-markers
    --tb=short
    --cov=backend
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml

# Markers for organizing tests
markers =
    unit: Unit tests (fast, no external dependencies) - 50% coverage required
    integration: Integration tests (API, database) - 30% coverage required
    system: System/E2E tests (full stack) - 30% coverage required
    slow: Tests that take more than 1 second

# Coverage options
[coverage:run]
source = backend
omit =
    */tests/*
    */venv/*
    */__pycache__/*
    */site-packages/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod

