# docker-compose.yaml
name: ac215-group1

services:
  # ---------- RAG PROFILE ----------
  chroma:
    image: chromadb/chroma:latest
    container_name: chroma
    profiles: ["rag"]
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
      - PERSIST_DIRECTORY=/chroma/chroma
    volumes:
      - chroma-data:/chroma/chroma
    networks:
      - app_net
    restart: unless-stopped

  llm-rag-job:
    build:
      context: ./rag
      dockerfile: Dockerfile
    image: ac215/llm-rag-job:local
    container_name: llm-rag-job
    profiles: ["rag"]
    env_file:
      - ./rag/.env
    environment:
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
    volumes:
      - ragdata:/var/lib/app/rag-data:rw
      - type: bind
        source: ./rag/secrets/service-account.json
        target: /secrets/service-account.json
        read_only: true
    depends_on:
      chroma:
        condition: service_started
    tty: true
    stdin_open: true
    networks:
      - app_net

  rag-service:
    build:
      context: .
      dockerfile: backend/rag_service/Dockerfile
    image: ac215/rag-service:local
    container_name: rag-service
    profiles: ["rag"]
    env_file:
      - ./rag/.env
    environment:
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
      RAG_COLLECTION_NAME: ${RAG_COLLECTION_NAME:-manim_knowledge}
      PORT: 8001
    ports:
      - "8001:8001"  # optional for debugging; can be removed in pure prod
    depends_on:
      chroma:
        condition: service_started
      llm-rag-job:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - app_net

  # ---------- BACKEND PROFILE ----------
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    image: ac215/backend:dev
    container_name: backend
    profiles: ["backend"]
    working_dir: /app
    env_file:
      - ./backend/.env
    environment:
      RAG_SERVICE_URL: http://rag-service:8001
      RAG_USE_CLOUD: "true"
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/service-account.json
      DEV: "1"
    volumes:
      - ./backend:/app/backend:cached
      - ./storage:/app/storage
      - type: bind
        source: ./rag/secrets/service-account.json
        target: /secrets/service-account.json
        read_only: true
    ports:
      - "8000:8000"  # optional; NGINX will proxy to backend:8000 internally
    depends_on:
      rag-service:
        condition: service_started
    networks:
      - app_net
    restart: unless-stopped

  # ---------- FRONTEND PROFILE ----------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    image: ac215/frontend:dev
    container_name: frontend
    profiles: ["frontend"]
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
    command: sh -lc "npm install && npm run dev"
    ports:
      - "8080:8080"  # optional; NGINX will proxy to frontend:8080 internally
    depends_on:
      backend:
        condition: service_started
    networks:
      - app_net

  # ---------- NGINX REVERSE PROXY ----------
  nginx:
    image: nginx:alpine
    container_name: nginx
    profiles: ["frontend", "backend", "rag"]
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      # add 443:443 when you do TLS
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      # - ./deploy/certs:/etc/nginx/certs:ro   # for TLS later
    networks:
      - app_net
    restart: unless-stopped

volumes:
  ragdata: {}
  chroma-data: {}

networks:
  app_net:
    driver: bridge
