# docker-compose.yaml
name: ac215-group1

services:

  # ---------- BACKEND PROFILE ----------
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    image: ac215/backend:dev
    container_name: backend
    profiles: ["backend"]
    working_dir: /app
    env_file:
      - ./backend/.env
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/service-account.json
      DEV: "1"
    volumes:
      - ./backend:/app/backend:cached
      - ./storage:/app/storage
      - type: bind
        source: ./rag/secrets/service-account.json
        target: /secrets/service-account.json
        read_only: true
    ports:
      - "8000:8000"  # optional; NGINX will proxy to backend:8000 internally
    networks:
      - app_net
    restart: unless-stopped

  # ---------- FRONTEND PROFILE ----------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    image: ac215/frontend:dev
    container_name: frontend
    profiles: ["frontend"]
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
    command: sh -lc "npm install && npm run dev"
    ports:
      - "8080:8080"  # optional; NGINX will proxy to frontend:8080 internally
    depends_on:
      backend:
        condition: service_started
    networks:
      - app_net
