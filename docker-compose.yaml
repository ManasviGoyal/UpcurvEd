name: upcurved

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    image: upcurved/backend:dev
    container_name: upcurved-backend
    profiles: ["backend"]
    working_dir: /app
    environment:
      APP_MODE: ${APP_MODE:-cloud}
      DEV: "1"
    volumes:
      - ./backend:/app/backend:cached
      - ./storage:/app/storage
      - ./tests:/app/tests:cached
    ports:
      - "8000:8000"
    networks:
      - app_net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    image: upcurved/frontend:dev
    container_name: upcurved-frontend
    profiles: ["frontend"]
    working_dir: /app
    volumes:
      - ./frontend:/app:cached
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_BASE_URL: http://localhost:8000
      VITE_APP_MODE: ${VITE_APP_MODE:-cloud}
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_started
    networks:
      - app_net

networks:
  app_net:
    driver: bridge
